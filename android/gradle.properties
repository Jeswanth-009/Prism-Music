org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.caching=false
android.useAndroidX=true
android.enableJetifier=true

# Kotlin compiler stability on Windows (avoid incremental cache lock races)
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.enabled=false
kotlin.caching.enabled=false

# Permission handler configuration
# Enable the permissions you need (disable unused ones to reduce app size)
android.permission.PERMISSION_READ_EXTERNAL_STORAGE=true
android.permission.PERMISSION_WRITE_EXTERNAL_STORAGE=true
android.permission.PERMISSION_READ_MEDIA_AUDIO=true
android.permission.PERMISSION_READ_MEDIA_IMAGES=true
android.permission.PERMISSION_NOTIFICATION=true
android.permission.PERMISSION_ACCESS_NETWORK_STATE=true
