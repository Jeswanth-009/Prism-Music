name: prism_music
description: "Prism Music - A privacy-first, high-fidelity music streaming app with no login required."
publish_to: 'none'

version: 0.1.0+6

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  
  # State Management - BLoC
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0
  equatable: ^2.0.5
  rxdart: ^0.28.0
  
  # Audio Player & Background Service
  
  # YouTube & Music Sources
  youtube_explode_dart: ^2.2.3
  dart_ytmusic_api: ^1.3.5
  
  # Network & HTTP
  dio: ^5.7.0
  connectivity_plus: ^6.0.5
  http: ^1.2.2
  logging: ^1.2.0
  crypto: ^3.0.5
  html: ^0.15.4
  
  # Last.fm Integration
  lastfm: ^0.0.6
  
  # Local Database - Hive for key-value, SQLite for queries
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  
  # Dependency Injection
  get_it: ^8.0.2
  injectable: ^2.4.4
  
  # Utils
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  share_plus: ^10.0.3
  url_launcher: ^6.3.1
  package_info_plus: ^8.0.3
  device_info_plus: ^11.1.1
  
  # Color Extraction for Dynamic Theming
  palette_generator: ^0.3.3+4
  
  # Lyrics
  scrollable_positioned_list: ^0.3.8
  
  # Downloads & File Management
  path: ^1.9.0
  
  # Functional Programming
  dartz: ^0.10.1
  
  # JSON Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  just_audio: ^0.10.5
  audio_session: ^0.1.21
  audio_service: ^0.18.18
  just_audio_background: ^0.0.1-beta.17
  shadcn_ui: 0.46.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  injectable_generator: ^2.6.2
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/dark.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/dark.png"
